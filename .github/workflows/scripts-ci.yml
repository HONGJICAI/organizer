name: Scripts CI

on:
  push:
    paths:
      - "scripts/**"
      - ".github/workflows/scripts-ci.yml"
  pull_request:
    paths:
      - "scripts/**"
      - ".github/workflows/scripts-ci.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: scripts

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install tools
        run: pip install pytest pytest-cov ruff

      # zip is needed to build the encrypted-archive test fixtures; p7zip-full
      # lets the opportunistic real-7z integration test run instead of skipping.
      - name: Install archive tools
        run: sudo apt-get update && sudo apt-get install -y zip p7zip-full

      - name: Lint
        run: ruff check

      - name: Test with coverage
        run: pytest --cov=decrypt_archives --cov-report=term-missing --cov-fail-under=90
