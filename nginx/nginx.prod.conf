worker_processes 1;
pid /run/nginx/nginx.pid;
error_log /dev/stderr notice;

events {
    worker_connections 1024;
}

http {
    include      mime.types;
    default_type application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;
    gzip            on;

    log_format main '[$time_local] "$request" $status $body_bytes_sent';
    log_format file '[$time_local] "$request"';

    server {
        listen 80;
        server_name _;

        # BE reads this file for cache/access statistics
        access_log /app/nginx/logs/file.access.log file;
        access_log /dev/stdout main;

        # API → uvicorn (local)
        location /api/ {
            proxy_pass         http://127.0.0.1:8001;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            gzip               on;
            gzip_proxied       any;
        }

        # Media files — BE symlinks /data/* into here at startup
        location /videos/ {
            root /app/nginx/html;
        }
        location /comics/ {
            root /app/nginx/html;
        }
        location /images/ {
            root /app/nginx/html;
        }

        # SvelteKit SPA (static adapter, SPA fallback)
        location / {
            root       /app/fe/build;
            try_files  $uri $uri/ /index.html;
            gzip_static on;
        }

        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /app/fe/build;
        }
    }
}
