services:
  nginx:
    image: "nginx"
    ports:
      - "80:80"
    volumes:
      - ./nginx:/etc/nginx
    depends_on:
      - be
      - fe
  fe:
    build:
      context: ./fe
      dockerfile: ./Dockerfile.dev
    expose:
      - 8002
    environment:
      - NODE_ENV=development
    volumes:
      - ./fe:/app/fe
      - /app/fe/node_modules # to avoid overwriting node_modules
    command: npm run dev
  be:
    build:
      context: ./be
      dockerfile: ./Dockerfile.dev
    volumes:
      - ./be:/app/be
      - ./nginx:/app/nginx
      - ${COMIC_PATH}:/data/comics
      - ${VIDEO_PATH}:/data/videos
      - ${IMAGE_PATH:-/tmp/images}:/data/images
    # network_mode: host
    expose:
      - 8001
    command: uvicorn main:app --host 0.0.0.0 --port 8001 --reload